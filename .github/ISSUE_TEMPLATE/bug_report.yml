name: Bug 报告
description: 报告 CmdPad 的问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: 问题描述
      description: 清晰描述你遇到的问题
    validations:
      required: true
  - type: textarea
    attributes:
      label: 复现步骤
      description: 如何触发这个问题？
      placeholder: |
        1. 打开 CmdPad
        2. 点击...
        3. 出现错误
  - type: textarea
    attributes:
      label: 期望行为
      description: 你期望发生什么？
  - type: input
    attributes:
      label: CmdPad 版本
      description: 你使用的是哪个版本？
      placeholder: v1.0.0
  - type: input
    attributes:
      label: 操作系统
      description: Windows 版本
      placeholder: Windows 11 24H2
  - type: textarea
    attributes:
      label: 截图/日志
      description: 如果有截图或错误日志，请附上
