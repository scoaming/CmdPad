name: 功能建议
description: 为 CmdPad 提一个新功能建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: 功能描述
      description: 清晰描述你想要的功能
    validations:
      required: true
  - type: textarea
    attributes:
      label: 使用场景
      description: 这个功能解决了什么问题？在什么场景下会用到？
    validations:
      required: true
  - type: textarea
    attributes:
      label: 可能的实现方案
      description: 如果你有想法，欢迎分享
